<!DOCTYPE html>
<html lang="es-CL">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Sala — LOEN</title>
  <meta name="description" content="Referencias e ideas musicales de LOEN (La Opción Es Nuestra)." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:ital,wght@0,400;0,600;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <p class="banda">LOEN <span class="banda-sub">· La Opción Es Nuestra</span></p>
      <h1 class="titulo-principal">
        <span class="tape tape--titulo" aria-hidden="true"></span>
        LA SALA
      </h1>
      <p class="bajada">Referencias e ideas para la próxima canción.</p>
    </div>
  </header>

  <main class="main">
    <nav class="filtros" aria-label="Filtrar contenido">
      <button class="filtro filtro--activo" data-filtro="todo" aria-pressed="true">Todo</button>
      <button class="filtro" data-filtro="referencia" aria-pressed="false">Referencias</button>
      <button class="filtro" data-filtro="riff" aria-pressed="false">Riffs &amp; ideas</button>
    </nav>

    <p id="estado-vacio" class="estado-vacio" hidden></p>

    <div id="lista" class="lista"></div>
  </main>

  <footer class="footer">
    <p>LOEN — La Sala</p>
  </footer>

  <script src="data/entries.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
